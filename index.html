<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurelia Studio | Design & Sviluppo Web</title>
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <script>
      // Suppress benign Vite HMR websocket errors that occur because HMR is disabled in this environment
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason && (
          event.reason.message === 'WebSocket closed without opened' || 
          (typeof event.reason === 'string' && event.reason.includes('WebSocket closed without opened'))
        )) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
